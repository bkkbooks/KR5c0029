front:
  text: 太上化道度世仙經傷九
  hash: sha256:0da331e58713ca3b1ac0ce81350566ab7e0409f1d66bf542a5bc6ffe9b513de8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0029_SJB_000-110403c, image: sjb/11/110403c.png}
body:
  text: 化道品第一爾時太上於无極元年歳次癸丑十月七日詣太清宫中七寳殿内論至眞妙道是時太上告左玄眞人曰太初混沌天地始分隂陽造化萬物含靈太初者混沌之始也混沌者天地分立之先也以太初爲祖始分天地配合隂陽立其五行分其四時之造化以發生萬物也强名曰道道乃天地隂陽之母五行萬物之宗道之无形故强名曰道也恍惚爲形恍惚者澄湛之意也謂大道視之无象聴之无聲遠之无則近之无依故以恍惚爲象以虚无為形隨之有理勤志皆明大道無形其理幽遠若不志勤難明妙理守終如始功行乃成修道之人施其功行守終如初大之與小無不成矣持齋奉戒淡泊爲門人以齋爲戒以戒為行齋戒爲行用淡泊爲根也身心清靜無愛無憎神好靜而以身心是非撓之太上以心無心以身無身乃虚心而實性無身而有神以神性共聚乃爲聖道之質也以虚無爲體何有憎愛六慾不賊六慾者眼耳鼻舌心意也常以舌貪其味眼觀其色耳聽其聲鼻嗅其香心意繫其事欲縁情逐物亂其身心皆六根之賊者也萬神乃遵人身中有三萬六千之神俱好生而不好死若人守其玄元之理達無爲之道身無穢汚萬神豈不遵伏也修心錬性是吾本身修心者以心無心也鍊性者以性無性也太上乃清靜虚無之神玄元至徳之尊凡人去其情染外其是非守其大逍之理豈不爲一體本身吾身非道因道成眞身非道者爲道乃虚無身則有象道在人身如石中之火不擊本無故身非道也擊之有象故因道成眞者也暗合天地杳杳㝠㝠杳㝠者清虚寂湛之象也爲天地萬物因道而生道無形體乃暗合在杳㝠虚無之中矣陽形質晝夜俱分天無形象以晝夜爲本道無形象以功行齋戒爲根四時為信運轉古今四時者春夏秋冬也天以四時爲信道以神化為應自元始至今豈有失乎不言善應萬物皆賔天之不言以隂陽四時善應萬物禀時而生殺自然可不爲賔伏者乎體之曰道依者爲眞天地之機四時之情若人體之運用依而於身修鍊三千功行成就變凡爲聖乃昇眞也五行品第二五行造化隂陽至精五行者金木水火土也乃造化萬物配合隂陽爲天地萬物之精華者也木火金水四象爲名四象以道名也嬰兒烢女金公黄婆也青龍左遶白虎右馴朱雀前立玄武後迎青龍屬木爲肝在左白虎屬金爲肺在右朱雀屬火爲心在前玄武屬水爲腎在後此乃五行之所主也丙丁甲乙壬癸庚辛乃四方之正名也東方九炁萬物發生南方三炁長養之神西方七炁素皓收成北方五炁玄天歸根東方九炁者四時之首也謂之曰和風乃發生萬物者也南方三炁者謂之炎風乃萬物之長養也西方七炁者謂之金風也萬物之衰殺也北方五炁者謂之寒風乃萬物之休息各歸根本此乃四炁之志也各旺八九隂陽合形各旺八九者爲五行逐四時各旺七十二日也乃曰七十二候也凡五日爲一小候七十二日爲一大候焉立春木旺七十二日立夏火旺七十二日立秋金旺七十二日立冬水旺七十二日金木水火四時共旺二百八十八日之數者也中央戊已四季獨尊中央戊已者土也乃中央一十二炁爲五行萬物之統領也土無正位以四季而獨尊也逐四時而各旺一十八日也爲土能和養萬物以中央爲尊也春旺臺花一十八日夏旺槐花一十八日秋旺菊花一十八日冬旺柰凍花一十八日四季共旺七十二日乃五行配合共成三百六十日爲一年之歳也地爲五嶽天應五星人有五蔵一體各分金木水火土五行爲五星五嶽五藏皆同一體也各分其類也地之五嶽者東方青帝乃發生萬物以東嶽泰山爲五嶽之長也南方赤帝長養萬物嶽曰衡山西方白帝主於收殺嶽曰華山北方黒帝萬物之功成歸本嶽曰恒山中央黄帝主和養萬物嶽曰嵩山此乃地之五行也天應五星者東方木徳歳星君南方火徳熒惑星君西方金徳太白星君北方水徳辰星君中央土徳鎮星君也此乃天之五行也人之五藏者心肝脾肺腎也肝應其木主於春屬東方甲乙心主火應於夏屬南方丙丁肺主金應於秋屬西方庚辛腎主水應於冬屬北方壬癸脾主土應於四季屬中央戊已此乃人之五行也天道萬物之造化皆不離於五行也天地與人元同一根天地萬物皆禀其一炁而成形以五行爲主用之本也純濁爲地天性輕清清炁爲天燭炁爲地清處其上濁處其下乃以二炁各歸其本也地燭無發天清無崩天乃輕清虚無爲象地以濁重純實爲形用其五行隂陽爲信乃不言而四時自運用其萬物爲本乃不裁而生殺自然此二象之無爲豈有崩發者也人之生死患害色身天地萬物根本皆一人物有生滅者爲人物有生有死生乃死之根死乃生之本也物之有生則成其象有象而乃爲色身色身患害情性有違有違則有滅也天地無生無滅爲情性無爲也凡人在天地之中從其六根染事著非好其邪淫貪愛名利以心神散亂失於大道不固身命任四時摧逼五行相賊禍患病苦以至死亡而不悟也那知妙道包含於天地統制萬物恩惠於蠢動養育於有情湛湛歴劫長存無不濟給者也隨天順地正道長存人若禀天地自然之理五行造化之機審察四時之運用乃治國之用可以國安民豐克清四海治家之用可以家豐禮義恩及親隣國主得之可以恊和萬邦統攝百寮侯伯得之可以執法禀正農事不亂庶人得之可以忠良智朴非事無紊修身得之可以去凡作聖壽同天地永劫長存矣玄理品第三無象曰道合理爲玄妙道無象以天爲本也覓道測其天理天理合作玄機玄機悟用成功功滿却同於道也春秋冬夏四季相連道之至理如天運四時乃法則之機本也周天列宿日月運行周天者一年之數也列宿者二十八宿天有上清十二宫內列其宿曜𨂷度地分十二地分皆以星宿上下照臨如日分十二時以時内分刻以大道虚旡暗合天理分度法則皆居一也日月之循環隂陽時刻豈有分别氣候時節體道自然氣候者一年有二十四氣七十二候凡十五日爲一氣五日爲一候一年二十四氣七十二候皆以節令相應也體道者爲四時氣候時刻乃用道之本天地造化之機若執天而行道隂陽氣候時刻在身施用而體道於自然者也雲騰雨施風雷不潜雲者地氣也地氣岀而騰於天天氣相合而成雨也爲天陽地隂隂陽相合而降甘雨也萬物潤澤長養皆不岀於水也風者五行之和氣也和而無剛乃遂其四時之情性生殺萬物剛柔相勝四時以此爲情萬物以此爲造化天地以此爲常雲雨以此爲車馬也雷者隂陽二炁相擊也爲地炁屬隂天炁屬陽以立春之後陽氣盛旺炎熱在上隂氣純冷上衝故冷熱相交而成聲冬天無雷者爲立秋之後陽氣漸衰隂氣盛旺陽氣消敗而無炎熱隂氣盛旺純冷上升故雷無聲也此二象匹配乃妙道施用風雷不潜乃隂陽搆合者也晝夜百刻遭匝成年凡一日一夜一百刻也以刻成時以時成日以日成月以月成年也如人有喘息之數一刻有一百三十五息十刻一千三百五十息百刻一萬三千五百息乃以息而刻同也天有晝夜百刻爲隂陽統領之機人有吐納喘息爲用功匹配之理至人若明妙道作用天道豈有分别者也帝道神化感應同天帝道者道泰徳勝之象也神化者隂陽不測之祥也以道泰而有祥感應合於天也天之道泰以感隂陽順序四季無差風雨應時爲天之祥也聖人道泰以感邦國太平賢臣輔佐天神應現爲國之祥也修身之道泰以感長生久視清淨無爲神魂變化爲身之祥也乃帝道神化感應居一也根生一祖枝分六源根生一祖者混元一炁也萬物皆禀一炁而生二二炁而成形也以一炁爲根祖也枝分六源者爲六炁也爲五行之所主也天有六氣乃四時風雨人有六氣者爲嘘氣屬肝外應木時應春卦應震呵氣屬心外應火時應夏卦應离呬氣主肺外應金時應秋卦應兌吹氣主腎外應水時應冬卦應坎呼氣主脾外應土時應四季也嘻氣主三焦外應風此乃六氣所主也修鍊之士不可不明火龍戯水金虎綿綿火龍者舌也一名赤龍爲舌主於心心屬南方丙丁火乃火龍也戯水者爲口中之津液也舌下有脉名曰玉泉内有神水華池又名瓊漿玉液乃玉華之眞醴也此水非氣而不至氣非水而不行太上乃鹿駕羊車神仙謂之瓊槳玉液凡人謂之津唾也几鍊金丹以爲根本也金虎者金主於西方名曰白虎内主於肺肺主於氣也凡鍊丹之用以氣行而津注津注而氣盈氣盈則神旺神旺則身輕以依時候用功大以九年功滿而神變神變而形住形住而氣住氣住而凡身聖凡身聖而萬神俱侍乃以昇騰變化身入無爲也五行顚倒四季循環五行顚倒者金木水火土相交如水上火下金水間隔翻騰徃來以顚倒之義也四季循環者如春夏秋冬也以如天運四時而造化萬物春夏秋冬四季而循環氣候旺衰加減餘閏週流復始乃循環之義也大道之理天地之機天道運轉豈有二乎凡人修錬用功法不可執自以智宜鑒之以法不應其天理之運用皆以小術執之有誤於人難逃生死也以大道之開合統領四時隂陽分配節氣刻候生育萬物包含於天地用法不一何以同天地之壽者也乾坤至理宇宙機權凡大道之作用與天地一體以五行眞氣之運動同四時而徃還故言乾坤宇宙之機理也寂靜爲妙烹錬則玄寂靜者以去其是非無有染著薄食淡味心無外亂乃修養之基也烹錬者以禀天地之理以隂陽媾合五行匹配四象分别用水火相交金木浮沈混合萬神烹鍊之功也餐津服炁畢成飛仙人口中之津液乃天地之至寳五行之秀氣也能長養萬物潤澤軀體乃因津而養血以血而養精因精而養氣因氣而養神因神以養命故鍊金丹以津液爲本也服氣者五行之正氣也天地以有四時晝夜爲用人以五臓氣脉爲根若人依妙理運用常餐津服氣功行滿畢飛升金闕也徃返於虚無者矣愚者自迷悟者有縁愚迷之人共浮世之利害繫染身心豈知大道之有學虚無有理也逹悟之人雖未得其至理性先樂其虚無詳天地四時運用有理審萬物造化生殺有情若以志討於仙經咸獲於妙法以功成果滿身證無爲之道故神仙有縁也訣曰常以子後午前面南端坐存神握固鳴鐘鼓各三十六通乃用四時旺氣爲頭循環五氣吐氣納津一季各吐納七十二口并土共九十口如一季三月四季共成三百六十口畢又加五口象一年三百六十餘五日之約乃爲一功又依頭週而復始三功一閏加三十口如同三年一閏也數内常無差錯漸以加功而自然食味減退以飢則氣渇則津五榖氣衰眞氣旺九年神化也太上化道度世仙經
